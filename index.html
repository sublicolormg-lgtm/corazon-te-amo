<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para José Armando ❤️</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family: 'Segoe UI', sans-serif;
    color:white;
    text-align:center;
}

/* Pantalla inicial */
#inicio{
    position:absolute;
    font-size:26px;
    letter-spacing:3px;
    cursor:pointer;
    animation: parpadeo 1.5s infinite;
}

@keyframes parpadeo{
    0%,100%{opacity:1;}
    50%{opacity:0.4;}
}

/* Nombre arriba */
#nombre{
    position:absolute;
    top:50px;
    font-size:28px;
    letter-spacing:4px;
    opacity:0;
    transition: opacity 2s ease;
    text-shadow:0 0 10px #ff4dff, 0 0 20px #ff4dff;
}

/* Corazón */
.heart{
    position:relative;
    width:320px;
    height:320px;
    transform: rotate(-45deg);
    display:none;
}

.heart span{
    position:absolute;
    color:#ff4dff;
    font-size:15px;
    opacity:0;
    text-shadow:
        0 0 5px #ff4dff,
        0 0 10px #ff4dff,
        0 0 20px #ff4dff,
        0 0 40px #ff4dff;
    transition: opacity 0.4s ease;
}

.latido{
    animation: latido 2s infinite;
}

@keyframes latido{
    0%,100%{transform: rotate(-45deg) scale(1);}
    50%{transform: rotate(-45deg) scale(1.1);}
}

/* Mensaje final */
#mensaje{
    position:absolute;
    bottom:60px;
    font-size:18px;
    width:80%;
    opacity:0;
    transition: opacity 3s ease;
}
</style>
</head>

<body>

<div id="inicio">Haz clic aquí ❤️</div>

<div id="nombre">José Armando 💖</div>

<div class="heart" id="heart"></div>

<div id="mensaje">
SI UN DIA ME NECESITA, SABE DONDE ENCONTRARME,<br>
YO ME ARRANCARIA EL CORAZON POR DARSELO A USTED
</div>

<script>
const inicio = document.getElementById("inicio");
const heart = document.getElementById("heart");
const mensaje = document.getElementById("mensaje");
const nombre = document.getElementById("nombre");

let elements = [];

function crearTexto(x,y){
    const span = document.createElement("span");
    span.innerText = "LO AMO";
    span.style.left = x + "px";
    span.style.top = y + "px";
    heart.appendChild(span);
    elements.push(span);
}

// Fórmula real de corazón
for(let t = 0; t < Math.PI * 2; t += 0.15){
    let x = 16 * Math.pow(Math.sin(t),3);
    let y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);

    let posX = 160 + x * 10;
    let posY = 160 - y * 10;

    crearTexto(posX, posY);
}

let i = 0;
function animar(){
    if(i < elements.length){
        elements[i].style.opacity = 1;
        i++;
        setTimeout(animar, 40);
    } else {
        setTimeout(()=> {
            mensaje.style.opacity = 1;
        }, 800);
    }
}

inicio.addEventListener("click", function(){
    inicio.style.display="none";
    heart.style.display="block";
    heart.classList.add("latido");
    nombre.style.opacity = 1;
    animar();
});
</script>

</body>
</html>
