<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ti ❤️</title>
<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.heart{
    position:relative;
    width:300px;
    height:300px;
    transform: rotate(-45deg);
    animation: latido 2s infinite;
}

.heart span{
    position:absolute;
    color:#ff00ff;
    font-size:18px;
    text-shadow:
        0 0 5px #ff00ff,
        0 0 10px #ff00ff,
        0 0 20px #ff00ff,
        0 0 40px #ff00ff;
    animation: brillo 3s infinite alternate;
}

@keyframes brillo{
    from{opacity:0.5;}
    to{opacity:1;}
}

@keyframes latido{
    0%,100%{transform: rotate(-45deg) scale(1);}
    50%{transform: rotate(-45deg) scale(1.1);}
}
</style>
</head>
<body>

<div class="heart" id="heart"></div>

<script>
const heart = document.getElementById("heart");

function crearTeAmo(x,y){
    const span = document.createElement("span");
    span.innerText = "Te amo";
    span.style.left = x + "px";
    span.style.top = y + "px";
    heart.appendChild(span);
}

for(let y=0; y<300; y+=25){
    for(let x=0; x<300; x+=25){
        let formula = Math.pow((x-150)/75,2) + Math.pow((y-150)/75,2) - 1;
        if(formula <= 0){
            crearTeAmo(x,y);
        }
    }
}
</script>

</body>
</html>
