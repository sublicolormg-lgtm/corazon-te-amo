<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Amor ❤️</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at center, #0f0c29, #302b63, #24243e);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family: 'Segoe UI', sans-serif;
    color:white;
}

h1{
    position:absolute;
    top:40px;
    font-size:28px;
    letter-spacing:3px;
    text-shadow:0 0 10px #ff00ff, 0 0 20px #ff00ff;
}

.heart{
    position:relative;
    width:320px;
    height:320px;
    transform: rotate(-45deg);
}

.heart span{
    position:absolute;
    color:#ff4dff;
    font-size:18px;
    opacity:0;
    text-shadow:
        0 0 5px #ff4dff,
        0 0 10px #ff4dff,
        0 0 20px #ff4dff,
        0 0 40px #ff4dff;
    transition: opacity 0.5s ease;
}

.latido{
    animation: latido 2s infinite;
}

@keyframes latido{
    0%,100%{transform: rotate(-45deg) scale(1);}
    50%{transform: rotate(-45deg) scale(1.1);}
}
</style>
</head>

<body>

<h1>Para Daniel 💖</h1> <!-- CAMBIA AQUI EL NOMBRE -->

<div class="heart latido" id="heart"></div>

<audio autoplay loop>
    <source src="https://www2.cs.uic.edu/~i101/SoundFiles/Perfect.wav" type="audio/wav">
</audio>

<script>
const heart = document.getElementById("heart");
let elements = [];

function crearTexto(x,y){
    const span = document.createElement("span");
    span.innerText = "LO AMO";
    span.style.left = x + "px";
    span.style.top = y + "px";
    heart.appendChild(span);
    elements.push(span);
}

for(let y=0; y<320; y+=22){
    for(let x=0; x<320; x+=22){
        let formula = Math.pow((x-160)/80,2) + Math.pow((y-160)/80,2) - 1;
        if(formula <= 0){
            crearTexto(x,y);
        }
    }
}

let i = 0;
function animar(){
    if(i < elements.length){
        elements[i].style.opacity = 1;
        i++;
        setTimeout(animar, 40);
    }
}

animar();
</script>

</body>
</html>
